<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Arena de Duelo - Mini Duel</title>
    <link rel="stylesheet" href="logado.css">
    <link rel="stylesheet" href="css/modal.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

<!-- BARRA DE STATUS -->
<div class="status-bar">
    <div class="status-lado">
        <span class="status-icone">👤</span>
        <span id="nomeUser">JOGADOR</span>
        <div class="lp-container">
            <span id="vidaJogador" class="lp-valor">5000</span>
            <span class="lp-label">LP</span>
        </div>
    </div>

    <div class="status-centro">
        <div id="turnoAviso">SORTEANDO...</div>
        <div id="placarMelhorDe3">RODADA 1: 0 - 0</div>
    </div>

    <div class="status-lado">
        <div class="lp-container">
            <span id="vidaOponente" class="lp-valor">5000</span>
            <span class="lp-label">LP</span>
        </div>
        MÁQUINA
        <span class="status-icone">🖥️</span>
    </div>
</div>

<!-- GAME WRAPPER -->
<div class="game-wrapper">
    <!-- COLUNA ESQUERDA (Sidebar: Cemitérios e Decks) -->
    <div class="side-col">
        <div id="cemiterioOponente" class="card-slot frame-c" data-label="GY"></div>
        
        <div class="monte-compra frame-b">
            <button id="btnComprar" onclick="comprarCarta()">
                <img src="imagens/back.jpg" alt="Deck">
                <span>BARALHO</span>
            </button>
        </div>
        <small id="contador-deck" style="display:block; text-align:center; font-size:10px; color:gold; margin-top:-10px;">0</small>

        <div id="cemiterioJogador" class="card-slot frame-c" data-label="GY"></div>
    </div>

    <!-- CAMPO CENTRAL (Board) -->
    <div class="board">
        <!-- Oponente -->
        <div id="especiaisOponente" class="grid suporte"></div>
        <div id="monstrosOponente" class="grid combate"></div>

        <!-- Barra de Ação Central -->
        <div class="action-bar">
            <button id="btnPassarTurno" class="action-icon-btn pass-turn" onclick="passarTurno()" style="display:none;" title="Passar Turno">
                <span>⏭️</span>
            </button>
            
            <button class="action-icon-btn log-toggle" onclick="toggleLog()" title="Log de Batalha">
                <span>📜</span>
            </button>

            <button id="btnSairJogo" class="action-icon-btn exit-game" onclick="window.location.href='mdeck.html'" title="Sair do Jogo">
                <span>🚪</span>
            </button>
        </div>

        <!-- Jogador -->
        <div id="monstrosJogador" class="grid combate"></div>
        <div id="especiaisJogador" class="grid suporte"></div>
    </div>

    <!-- MÃOS LATERAIS -->
    <div class="hand-side">
        <div id="maoOponente" class="fan"></div>
        <div id="minhaMao" class="fan"></div>
    </div>
</div>

<!-- LOG PANEL -->
<div class="log-panel" id="logPanel">
    <div class="log-header">
        <span>LOG DE BATALHA</span>
        <div class="close-log" onclick="toggleLog()">✖</div>
    </div>
    <div id="logConteudo" class="log-conteudo"></div>
</div>

<!-- MODAL ROLETA -->
<div id="modalRoleta" class="modal">
    <div class="modal-content">
        <h3>QUEM COMEÇA?</h3>
        <div class="roleta-moldura">
            <div id="roleta">
                <div class="fatia voce">VOCÊ</div>
                <div class="fatia maquina">MÁQUINA</div>
            </div>
        </div>
        <button id="btnGirar" onclick="girarRoleta()">GIRAR</button>
    </div>
</div>

<!-- MODAL AÇÃO -->
<div id="modalPosicao" class="modal">
    <div class="modal-content">
        <h3 id="textoModal">ESCOLHA UMA AÇÃO</h3>
        <div id="botoesAcao"></div>
        <button onclick="fecharModal()">CANCELAR</button>
    </div>
</div>

<!-- SCRIPTS -->
<script src="script.js"></script>

</body>
</html>
