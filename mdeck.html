<!DOCTYPE html> 
 <html lang="pt-br"> 
 <head> 
     <meta charset="UTF-8"> 
     <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> 
     <title>Montar Deck - Oficial</title> 
     <link rel="stylesheet" href="index.css"> 
     <link rel="stylesheet" href="mdeck.css"> 
 	 
     <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet"> 
 </head> 
 <body> 
     <div class="deck-container"> 
         <div class="deck-toolbar"> 
             <div class="toolbar-row">
                 <div class="toolbar-actions"> 
                     <button class="toolbar-btn btn-back" onclick="window.location.href='index.html'">VOLTAR</button>
                     <button class="toolbar-btn" onclick="window.location.href='deck.html'">VITRINE</button> 
                     <button class="toolbar-btn btn-arena" onclick="window.location.href='logado.html'">ARENA ⚔️</button> 
                     <button class="toolbar-btn" onclick="window.location.href='loja.html'">LOJA 🛒</button> 
                 </div> 
                 <button class="toolbar-btn" style="background: #8b0000;" onclick="esvaziarTudo()">LIMPAR SLOTS</button> 
             </div>

             <div class="toolbar-stats-filters">
                 <div class="stats-and-filters">
                     <div class="stats-display" id="statsJogador"></div> 
                     <div class="deck-filters">
                         <label for="filtroNivelInventario" style="color:var(--madeira); font-weight:bold; font-size:0.8rem;">FILTRAR NÍVEL:</label>
                         <select id="filtroNivelInventario" onchange="filtrarNivel(this.value)" style="padding: 5px; border: 2px solid var(--madeira); border-radius: 4px; font-family:'Cinzel';">
                             <option value="0">TODOS</option>
                             <option value="1">NÍVEL 1</option>
                             <option value="2">NÍVEL 2</option>
                             <option value="3">NÍVEL 3</option>
                             <option value="4">NÍVEL 4</option>
                             <option value="5">NÍVEL 5</option>
                             <option value="6">NÍVEL 6</option>
                             <option value="7">NÍVEL 7</option>
                             <option value="8">NÍVEL 8</option>
                             <option value="9">NÍVEL 9</option>
                             <option value="10">NÍVEL 10</option>
                             <option value="11">SACRIFÍCIO</option>
                         </select>
                     </div>
                 </div>
             </div>
         </div> 
 
         <div class="builder-row"> 
             <div class="panel"> 
                <div class="panel-title">DECK ATIVO (<span id="deckCount">0 / 28</span>)</div> 
                 <div class="deck-slots" id="deckSlots"></div> 
                 <button id="btnSalvarDeck" class="toolbar-btn" style="width: 100%; margin-top: 15px;" disabled>SALVAR DECK</button> 
             </div> 
 
             <div class="panel"> 
                 <div class="panel-title">MEU INVENTÁRIO</div> 
                 <div class="deck-grid" id="listaCartas"></div> 
             </div> 
         </div> 
     </div> 
     <script src="mdeck.js"></script> 
 </body> 
 </html>
